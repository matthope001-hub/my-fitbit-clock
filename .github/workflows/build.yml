name: Build Fitbit Clock Face

on:
  workflow_dispatch:
  push:
    paths:
      - 'build-request.json'
      - 'resources/photo.png'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate source files from config
        run: node .github/workflows/scripts/generate-source.js

      - name: Verify package.json
        run: |
          echo "=== package.json ==="
          cat package.json
          echo "=== Validating UUID ==="
          node -e "const p=require('./package.json'); console.log('UUID:', p.appUUID); console.log('Name:', p.displayName); console.log('Targets:', p.buildTargets);"

      - name: Install Fitbit SDK in isolated folder
        run: |
          mkdir -p /tmp/fitbit-sdk
          cd /tmp/fitbit-sdk
          npm init -y
          npm install --save-dev @fitbit/sdk@~6.2.0-pre.1 @fitbit/sdk-cli@~1.8.0-pre.10
          echo "SDK installed at /tmp/fitbit-sdk"
          ls node_modules/.bin/fitbit-build

      - name: Build FBA using isolated SDK
        run: |
          export PATH="/tmp/fitbit-sdk/node_modules/.bin:$PATH"
          echo "=== Final package.json before build ==="
          cat package.json
          fitbit-build

      - name: Copy to predictable filename
        run: cp build/*.fba build/clockface.fba

      - name: Write success status
        run: echo '{"status":"success","built_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > build/status.json

      - name: Commit results back
        run: |
          git config user.name "Fitbit Builder"
          git config user.email "builder@fitbitforge.local"
          git add build/clockface.fba build/status.json
          git commit -m "Clock face built [skip ci]" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save FBA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clockface-fba
          path: build/clockface.fba
          retention-days: 30
